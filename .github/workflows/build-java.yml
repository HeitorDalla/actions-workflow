name: Build

on:
  workflow_call:
    inputs:
      os_version:
        description: Runner que vai rodar o job
        default: ubuntu-latest
        required: false
        type: string
      container_name:
        description: Container que vai rodar o job
        default: maven:3.9.6-eclipse-temurin-17
        required: false
        type: string
      script_hello_path:
        description: Caminho do script Hello World
        default: ./.github/scripts/hello.sh
        required: false
        type: string
      artifact_name:
        description: Nome do artefato
        default: app-jar
        required: false
        type: string
      artifact_path:
        description: Caminho do artefato
        default: target/*.jar
        required: false
        type: string

jobs:
  build:
    name: Build Maven

    runs-on: ${{ inputs.os_version }}
    container: ${{ inputs.container_name }}

    # Lista de passo a passo do job (todos os passos compartilham o mesmo workspace e variaveis de ambiente
    steps:
      - uses: ./.github/actions/checkout

      # Executa múltiplos comandos no shell do ambiente (Ubuntu)
      - name: Run Startup Script
        run: ${{ inputs.script_hello_path }}

      # Colocar cache nas dependências do Maven
      - uses: ./.github/actions/cache-maven

      #      # O job falha se houver violações no código-fonte Java
      #      - name: Checkstyle (violations)
      #        run: mvn -B checkstyle:check

      # Build do projeto
      - name: Build Project
        run: mvn -B install -Dcheckstyle.skip=true # remover skip em produção

      # Envia arquivos gerados pelo build para a seção de Artifacts da execução (para testes locais)
      - uses: ./.github/actions/upload-artifact
        with:
          artifact_name: ${{ inputs.artifact_name }}
          artifact_path: ${{ inputs.artifact_path }}

      # Se qualquer dos passos anteriores falhou, o valor será verdadeiro
      - name: Notifies on Failure
        # sucess() - executa o 'step' se TODOS os processos anteriores tiverem sido bem-sucedidos (PADRÃO)
        # always() - faz com que o job seja executado SEMPRE, independentemente do status anterior
        # failure() - executa o 'step' apenas se o passo anterior falhar
        # cancelled() - executa o 'step' se o workflow for cancelado
        if: failure()
        run: echo "The build job failed! Please, check the logs."