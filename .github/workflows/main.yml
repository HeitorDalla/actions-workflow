# Nome do workflow
name: Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  # Permite rodar o workflow manualmente
  workflow_dispatch:

  # Permite agendar a execução do pipeline
  schedule:
    # Vai rodar todo dias as 15:00 horas (minuto, hora, dia do mês, mês e dia da semana)
    - cron: "0 15 * * *"

# Mudando as permissões para só ter permissão de ler dentro do repositório (pois esta dentro da branch 'main')
permissions:
  contents: read
  actions: read
  security-events: write

# Variáveis para a pipeline (pode ter diferentes scopos - pipeline, job, step)
env:
  SCRIPT_HELLO: "./hello.sh"

# Dentro do workflow existe 'jobs' (tarefas), e dentro de cada job, há 'steps' (passos) que serão executados em sequência (OS jobs PODEM RODAR EM PARALELO)
jobs:
  build:
    # Nome do build para aparecer em logs
    name: Build

    # Máquina que vai rodar o job (poderia ser uma máquina nas hospedada nos domínios do github, sendo um self‑hosted runner)
    runs-on: ubuntu-latest

    # Conteinerizar o meu pipeline
    container: "maven:3.9.6-eclipse-temurin-17"

    # Lista de passo a passo do job (todos os passos compartilham o mesmo workspace e variaveis de ambiente
    steps:
      # Esse passo faz o checkout do repositório no runner, colocando o código em $GITHUB_WORKSPACE (sem isso os proximos passos nao teriam acesso ao código do repositório) (vai clonar o codigo fonte para dentro do runner)
      - name: Checar o código
        uses: actions/checkout@v4
        # Passar parâmetros de entrada para a ação
        with:
          # Permite obter todo o histórico de commits (útil para checagem de branches)
          fetch-depth: 0

      # Executa múltiplos comandos no shell do ambiente (Ubuntu)
      - name: Executar multiplos comandos shell
        run: $SCRIPT_HELLO

#      # Falha o job se houver violações no código-fonte Java
#      - name: Checkstyle (violations)
#        run: mvn -B checkstyle:check

      # Buildar o projeto
      - name: Build Maven
        run: mvn -B install -Dcheckstyle.skip=true

      # Serve para enviar arquivos gerados pelo build para a seção de Artifacts da execução (para testes locais)
      - name: Upload do Build Artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      # Se qualquer dos passos anteriores falhou, o valor será verdadeiro
      - name: Notificar se o build falhar
        # sucess() - executa o 'step' se TODOS os processos anteriores tiverem sido bem-sucedidos (PADRÃO)
        # always() - faz com que o job seja executado SEMPRE, independentemente do status anterior
        # failure() - executa o 'step' apenas se o passo anterior falhar
        # cancelled() - executa o 'step' se o workflow for cancelado
        if: failure()
        run: echo "O Build do job falhou! Favor checar os logs."

  testing:
    # Nome para logs
    name: Test

    # Máquina que vai ser utilizada para rodar o job
    runs-on: ubuntu-latest

    container: "maven:3.9.6-eclipse-temurin-17"

    # Necessário caso queira executar uma tarefa antes da outra (impedindo que as tarefas iniciem paralelamente)
    # Ele depende do build, ou seja, se falhar, ele da skip automaticamente
    needs: build

    # Lista de passo a passo do job (todos os passos compartilham o mesmo workspace e variaveis de ambiente
    steps:
      # Esse passo faz o checkout do repositório no runner, colocando o código em $GITHUB_WORKSPACE (sem isso os proximos passos nao teriam acesso ao código do repositório) (vai clonar o codigo fonte para dentro do runner)
      - name: Checar o código
        uses: actions/checkout@v4
        # Passar parâmetros de entrada
        with:
          # Permite obter todo o histórico de commits (útil para checagem de branches)
          fetch-depth: 0

      # Executar os testes do projeto apenas quanto o ref = refs/heads/main (PORQUE EU QUERO RODAR TESTES APENAS NA BRANCH 'main')
      - name: Rodar os testes dentro da branch 'main'
        # Verificando se a branch atual for 'main'
        if: ${{ github.ref == 'refs/heads/main' }}
        run: mvn -B test

      # Vai analisar o código fonte para garantir regras de formatação e gerar um relatório HTML
      - name: Checkstyle
        if: ${{ github.ref == 'refs/heads/main' }}
        run: mvn -B checkstyle:checkstyle

      # Vai disponibilizar o relatório como um Artifacts
      - name: Disponibilizando artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: |
            target/site/checkstyle.html
            target/checkstyle-result.xml

      # Vai validar se a branch é diferente da 'main'
      - name: Executar testes em outras branches
        if: ${{ github.ref != 'refs/heads/main' }}
        run: echo "Pulando os testes unitários e análise de código"

  # Job para fazer um 'Security Scan' com a ferramenta open-source trivy
  trivy-scan:
    name: Trivy-scan

    runs-on: ubuntu-latest

    container: "maven:3.9.6-eclipse-temurin-17"

    needs: build

    steps:
      - name: Checar o código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Instalar o Trivy
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          trivy-version: 'v0.68.2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # evitar rate limit no download do release

      # Executar o scan de filesystem no repositório
      - name: Rodar Trivy (file system)
        run: |
          trivy fs --format sarif \
                   --output trivy-results.sarif \
                   .

      # Serve para enviar arquivos gerados pelo build para a seção de Artifacts da execução (para testes locais)
      - name: Upload do escaneamento (trivy) como um artefato
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif

      # Serve para enviar a analise para a aba de segurança
      - name: Upload do Trivy scan na aba Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'