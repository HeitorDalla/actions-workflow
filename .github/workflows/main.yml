name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

#  schedule:
#    # Vai rodar todo dias as 15:00 horas (minuto, hora, dia do mês, mês e dia da semana)
#    - cron: "0 18 * * *"

# Mudando as permissões especificas da aplicacao
permissions:
  contents: read # necessario para permitir que o workflow tenha permissao de leitura sobre os arquivos de repositorio
  actions: read # permite que o workflow leia informacoes sobre jobs e steps anteriores
  security-events: write # permite que o workflow envie dados para a aba `security` do repositorio, principalmente para o `Code Scanning`
  id-token: write # permite que o workflow solicite um token OICD assinado pelo Github (pedrao para autenticacao sem chaves - Workload Identity Federation)

jobs:
  build:
    uses: ./.github/workflows/build-java.yml
    with:
      os_version: ubuntu-latest
      container_name: maven:3.9.6-eclipse-temurin-17
      artifact_name: app-jar
      artifact_path: target/*.jar

  test:
    needs: [ build ]
    uses: ./.github/workflows/test-java.yml
    with:
      os_version: ubuntu-latest
      container_name: maven:3.9.6-eclipse-temurin-17
      artifact_name: checkstyle-report
      artifact_path: |
        target/site/checkstyle.html
        target/checkstyle-result.xml

  trivy_scan:
    needs: [ build ]
    uses: ./.github/workflows/scan-security.yml
    with:
      os_version: ubuntu-latest
      container_name: maven:3.9.6-eclipse-temurin-17
      trivy_version: v0.68.2
      artifact_name: trivy-scan-results
      artifact_path: trivy-results.sarif

  build_push_artifact:
    needs: [ build, test, trivy_scan ]
    uses: ./.github/workflows/docker-publish.yml

    if: ${{ github.ref == 'refs/heads/main' }}

    with:
      os_version: ubuntu-latest
      environment_name: production
      sdk_version: '>= 363.0.0'
      REGION: us-west4
      PROJECT_ID: meta-coral-473420-b8
      REPOSITORY: library-ops
      IMAGE_NAME: my-app
      TAG_NAME: ${{ github.sha }}
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}