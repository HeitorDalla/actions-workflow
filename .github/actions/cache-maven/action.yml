author: Heitor Giussani Dalla Villa
name: Cache Maven
description: Faz o caching das dependências do Maven

runs:
  using: composite

  steps:
    - name: Cache Maven Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-